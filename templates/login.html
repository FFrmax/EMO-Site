<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EMO - Giris Yap</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body data-theme="dark" class="auth-body">
    <div class="auth-container">
        <div class="auth-logo">
            <h1>EMO</h1>
            <p>Mesajlasma Platformu</p>
        </div>
        <div class="auth-card">
            <h2>Giris Yap</h2>
            <p class="subtitle">Hesabiniza giris yapin</p>

            <div class="error-message" id="errorMsg"></div>
            <div class="success-message" id="successMsg"></div>

            <form class="auth-form" id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Kullanici Adi</label>
                    <input type="text" id="username" placeholder="Kullanici adinizi girin" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label>Sifre</label>
                    <input type="password" id="password" placeholder="Sifrenizi girin" required autocomplete="current-password">
                </div>
                <button type="submit" class="auth-btn" id="submitBtn">Giris Yap</button>
            </form>

            <div class="auth-footer">
                Hesabiniz yok mu? <a href="/register">Kayit Ol</a>
            </div>
        </div>
    </div>

    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const err = document.getElementById('errorMsg');
            const suc = document.getElementById('successMsg');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> Giris yapiliyor...';
            err.style.display = 'none'; suc.style.display = 'none';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value.trim(),
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();
                if (data.success) {
                    if (data.theme) document.body.setAttribute('data-theme', data.theme);
                    suc.textContent = 'Giris basarili!';
                    suc.style.display = 'block';
                    setTimeout(() => window.location.href = '/chat', 600);
                } else {
                    err.textContent = data.error || 'Giris basarisiz';
                    err.style.display = 'block';
                    btn.disabled = false; btn.textContent = 'Giris Yap';
                }
            } catch (ex) {
                err.textContent = 'Baglanti hatasi';
                err.style.display = 'block';
                btn.disabled = false; btn.textContent = 'Giris Yap';
            }
        }
    </script>
</body>
</html>
